name: CI
permissions:
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest
